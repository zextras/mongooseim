[general]
  loglevel = "error"
  hosts = ["localhost"]
  default_server_domain = "localhost"
  language = "en"
  rdbms_server_type = "pgsql"

[auth]
  [auth.rdbms]

[s2s]
  default_policy = "deny"

[outgoing_pools.rdbms.default]
  scope = "global"
  strategy = "best_worker"
  workers = 10

  [outgoing_pools.rdbms.default.connection]
    driver = "pgsql"
    host = "localhost"
    port = 5432
    database = "mongooseim"
    username = "postgres"
    password = "mongooseim_secret"
    keepalive_interval = 30

[listen]
  [[listen.c2s]]
    port = 5222

  [[listen.http]]
    port = 8888
    transport.num_acceptors = 10
    transport.max_connections = 1024

    [[listen.http.handlers.mod_websockets]]
      host = "_"
      path = "/ws-xmpp"

    [[listen.http.handlers.mongoose_graphql_handler]]
      host = "localhost"
      path = "/api/graphql"
      schema_endpoint = "admin"
      username = "admin"
      password = "secret"

[modules.mod_muc_light]
  backend = "rdbms"
  host = "muclight.@HOST@"
  equal_occupants = true
  all_can_configure = true
  all_can_invite = true
  rooms_per_page = 10
  rooms_in_rosters = false
  max_occupants = 128

[modules.mod_disco]
  iqdisc.type = "one_queue"
  server_info = [
    {name = "abuse-address", urls = ["admin@example.com"]},
  ]
  users_can_see_hidden_services = true

[modules.mod_mam]
  backend = "rdbms"
  muc.backend = "rdbms"
  muc.host = "muclight.@HOST@"
  db_message_format = "mam_message_xml"
  archive_chat_markers = false
  full_text_search = true

[modules.mod_inbox]
  backend = "rdbms"
  reset_markers = ["displayed"]
  groupchat = ["muclight"]
  aff_changes = true
  remove_on_kicked = true

[modules.mod_last]
  backend = "rdbms"

[modules.mod_offline_stub]

[modules.mod_roster]
  backend = "rdbms"

[modules.mod_carboncopy]

[modules.mod_smart_markers]
  backend = "rdbms"

[modules.mod_presence]

[modules.mod_pin_message]


[modules.mod_ping]

[services.service_mongoose_system_metrics]
  report = false
